<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ecommerce UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f3f3;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #131921;
      color: white;
      padding: 10px 20px;
    }

    .logo {
      font-size: 20px;
      font-weight: bold;
    }

    .menu {
      font-size: 24px;
      cursor: pointer;
    }

    .search-bar {
      flex: 1;
      margin: 0 15px;
    }

    .search-bar input {
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      border: none;
    }

    .cart {
      cursor: pointer;
    }

    /* LOCATION */
    .location {
      background: #232f3e;
      color: white;
      padding: 8px 20px;
      font-size: 14px;
    }

    /* PRODUCT GRID */
    .products {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .btn {
      background: #ffd814;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      margin-top: 10px;
      border-radius: 4px;
    }

    .btn:hover {
      background: #f7ca00;
    }

    @media(max-width: 900px){
      .products {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media(max-width: 500px){
      .products {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="menu">☰</div>
    <div class="logo">ShopX</div>

    <div class="search-bar">
      <input type="text" placeholder="Search products...">
    </div>

    <div class="cart">🛒 Cart (<span id="cart-count">0</span>)</div>
  </div>

  <!-- LOCATION -->
  <div class="location">
    Deliver to: <select>
      <option>Mumbai</option>
      <option>Delhi</option>
      <option>Pune</option>
      <option>Bangalore</option>
    </select>
  </div>

  <!-- PRODUCTS -->
  <div class="products">
    
    <div class="card">
      <img src="f1.jfif" alt="shoes">
      <h3>Product 1</h3>
      <p>₹999</p>
      <button class="btn" onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="f2.jfif" alt="shoes">
      <h3>Product 2</h3>
      <p>₹1499</p>
      <button class="btn" onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="f3.jfif" alt="shoe">
      <h3>Product 3</h3>
      <p>₹799</p>
      <button class="btn" onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="card">
      <img src="f4.jfif" alt="shoe">
      <h3>Product 4</h3>
      <p>₹1999</p>
      <button class="btn" onclick="addToCart()">Add to Cart</button>
    </div>

  </div>

  <script>
    let count = 0;

    function addToCart() {
      count++;
      document.getElementById("cart-count").innerText = count;
    }
  </script>

</body>
</html>
